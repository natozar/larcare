<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3E6B5C" />
  <meta name="color-scheme" content="light" />
  <meta name="description" content="Aplicativo do LarCare — protótipo navegável da plataforma de pequenos reparos domésticos com prestadores verificados." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://natozar.github.io/larcare/" />
  <meta property="og:title" content="LarCare — Aplicativo" />
  <meta property="og:description" content="Cliente, prestador e leilão de propostas. Protótipo navegável." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://natozar.github.io/larcare/icons/og-image-v3.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>LarCare — Aplicativo</title>

  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LarCare" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#3E6B5C" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#2A4D43" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#app">Pular para conteúdo principal</a>

  <div id="demo-banner" class="demo-banner" role="status" aria-live="polite">
    <div class="demo-banner__inner">
      <span class="avatar avatar--sm avatar--accent demo-banner__avatar" aria-hidden="true">MC</span>
      <span class="demo-banner__copy">
        <span class="demo-banner__eyebrow">
          <span class="demo-banner__dot" aria-hidden="true"></span>
          <span class="demo-banner__kicker">modo demonstração</span>
        </span>
        <span class="demo-banner__identity">
          <span class="demo-banner__name">Maria Cristina</span>
          <span class="demo-banner__place">Jd. Califórnia, Ribeirão Preto</span>
        </span>
      </span>
      <button type="button" class="demo-banner__close" aria-label="Fechar aviso de demonstração" data-action="dismiss-demo-banner">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M6 6l12 12M6 18L18 6"/>
        </svg>
      </button>
    </div>
  </div>

  <header id="site-header" class="site-header" data-variant="public"></header>

  <main id="app" class="app" tabindex="-1"></main>

  <footer id="site-footer" class="site-footer"></footer>

  <nav id="app-bottom-nav" class="app-bottom-nav" aria-label="Navegação inferior" hidden></nav>

  <div id="update-banner" class="update-banner" hidden role="status" aria-live="polite">
    <div class="update-banner__inner">
      <span class="update-banner__icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 4v12M6 10l6-6 6 6"/>
          <path d="M4 20h16"/>
        </svg>
      </span>
      <span class="update-banner__label">
        <strong>Nova versão disponível</strong>
        <span class="update-banner__hint">Atualize para receber as melhorias mais recentes.</span>
      </span>
      <button type="button" class="update-banner__cta" data-action="apply-update">Atualizar agora</button>
    </div>
  </div>

  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
  <div id="modal-root" class="modal-root" aria-hidden="true"></div>

  <button id="demo-fab" class="demo-fab" type="button" hidden>
    <span class="demo-fab__pulse" aria-hidden="true"></span>
    <span class="demo-fab__label">Ver demonstração rápida</span>
  </button>

  <!-- Bottom sheet customizado de instalação PWA (3 variantes: android/ios/in-app) -->
  <div id="install-sheet" class="install-sheet" role="dialog" aria-modal="true" aria-labelledby="install-sheet-title" hidden>
    <div class="install-sheet__backdrop" aria-hidden="true"></div>
    <div class="install-sheet__card">
      <button class="install-sheet__close" type="button" data-install-action="dismiss" aria-label="Fechar">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
      </button>
      <div class="install-sheet__handle" aria-hidden="true"></div>
      <div class="install-sheet__body"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/install_detector.js"></script>
  <script src="js/install_prompt.js"></script>
  <script src="js/mock_data.js"></script>
  <script src="js/data_layer.js"></script>
  <script src="js/simulator.js"></script>
  <script src="js/components.js"></script>
  <script src="js/views.js"></script>
  <script src="js/views_provider.js"></script>
  <script src="js/views_search.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/demo_tour.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
