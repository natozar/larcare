<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3E6B5C" />
  <meta name="color-scheme" content="light" />
  <meta name="description" content="Aplicativo do LarCare — protótipo navegável da plataforma de pequenos reparos domésticos com prestadores verificados." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://natozar.github.io/larcare/" />
  <meta property="og:title" content="LarCare — Aplicativo" />
  <meta property="og:description" content="Cliente, prestador e leilão de propostas. Protótipo navegável." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://natozar.github.io/larcare/icons/og-image-v3.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>LarCare — Aplicativo</title>

  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="LarCare" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#app">Pular para conteúdo principal</a>

  <header id="site-header" class="site-header" data-variant="public"></header>

  <main id="app" class="app" tabindex="-1"></main>

  <footer id="site-footer" class="site-footer"></footer>

  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
  <div id="modal-root" class="modal-root" aria-hidden="true"></div>

  <button id="demo-fab" class="demo-fab" type="button" hidden>
    <span class="demo-fab__pulse" aria-hidden="true"></span>
    <span class="demo-fab__label">Ver demonstração rápida</span>
  </button>

  <div id="install-banner" class="install-banner" hidden>
    <div class="install-banner__inner">
      <div class="install-banner__copy">
        <strong>Instale o LarCare no seu celular</strong>
        <span id="install-banner-hint">Acesso rápido, sem entrar pelo navegador.</span>
      </div>
      <div class="install-banner__actions">
        <button class="btn btn--ghost btn--sm" id="install-dismiss" type="button">Agora não</button>
        <button class="btn btn--primary btn--sm" id="install-accept" type="button">Instalar</button>
      </div>
    </div>
  </div>

  <script src="js/mock_data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/views.js"></script>
  <script src="js/views_provider.js"></script>
  <script src="js/demo_tour.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
