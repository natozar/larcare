<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página não encontrada — LarCare</title>
  <link rel="icon" href="icons/favicon.ico" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    // GitHub Pages SPA fallback — preserve the original path/hash
    (function () {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      // If user landed on a deep path, redirect to root with the path embedded as hash
      var base = path.replace(/[^/]+$/, '');
      window.location.replace(base + (hash || '#/'));
    })();
  </script>
</head>
<body class="standalone-page">
  <main class="standalone-page__inner">
    <img src="icons/icon-192.png" alt="LarCare" width="80" height="80" />
    <h1>Página não encontrada</h1>
    <p>Estamos te levando de volta para o início.</p>
    <a class="btn btn--primary" href="./">Ir para o início</a>
  </main>
</body>
</html>
